<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Rnai icon — teal rounded square, geometric lowercase "r", orange spark dot -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11505F"/>
      <stop offset="1" stop-color="#0B3945"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <!-- stem ของตัว r -->
  <path d="M 196 196 L 196 356" stroke="#FFFFFF" stroke-width="62" stroke-linecap="round" fill="none"/>
  <!-- ไหล่โค้งของตัว r -->
  <path d="M 196 300 Q 196 196 306 196" stroke="#FFFFFF" stroke-width="62" stroke-linecap="round" fill="none"/>
  <!-- จุดส้ม = ประกาย AI -->
  <circle cx="382" cy="196" r="34" fill="#D77757"/>
</svg>
